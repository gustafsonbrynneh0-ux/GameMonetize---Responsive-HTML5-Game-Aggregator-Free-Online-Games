<body>

                    <label>Game name contains:</label>
                    <input type="text" id="name" placeholder="Enter keyword (e.g. game)" value="">
                </div>

            </div>

            <!-- Games Section -->
            <div class="games-section">
                <!-- Ad Section -->
                <div class="ad-section">
                    <script async="async" data-cfasync="false" src="https://pl28804136.effectivegatecpm.com/5bcd8bdcf004c539ce0230a909bc1137/invoke.js"></script>
                    <div id="container-5bcd8bdcf004c539ce0230a909bc1137"></div>
                </div>
                
                <!-- Game List Container -->
                <div id="games-container">
                    <div class="loading">Click "Filter Games" to load game list...</div>
                </div>

                <!-- Game Detail Page Container -->
                <div id="game-detail" class="game-detail">
                    <div class="detail-header">
                        <a href="javascript:backToList()" class="detail-back">← Back to Game List</a>
                        <h2 class="detail-title" id="detail-game-title"></h2>
                    </div>
                    
                    <div class="detail-content">
                        <!-- Game area -->
                        <div class="game-area">
                            <iframe id="game-player-iframe" class="game-player" src="" frameborder="0" allowfullscreen></iframe>
                            <div class="game-controls">

                                    Fullscreen
                                </button>

                        <div id="container-5bcd8bdcf004c539ce0230a909bc1137"></div>

    <script>
        const baseUrl = 'https://gamemonetize.com/feed.php';
        let currentGames = []; // Store current loaded games for detail page

        // Load game list from GameMonetize API (XML format)
        async function fetchGames(page = 1) {
            const container = document.getElementById('games-container');
            container.innerHTML = '<div class="loading">Loading...</div>';

            // Build request parameters (format=1 for XML)
            const params = new URLSearchParams({
                format: 1, // Changed to 1 for XML mode
                num: document.getElementById('num').value,
                page: page
            });

            // Add name parameter if not empty
            const gameName = document.getElementById('name').value.trim();
            if (gameName) {
                params.append('name', gameName);
            }

            // Add category parameter if not "All Categories"
            const category = document.getElementById('category').value;
            if (category !== '0') {
                params.append('category', category);
            }

            const url = `${baseUrl}?${params.toString()}`;
            console.log('Request URL (XML):', url);

            try {
                const res = await fetch(url);
                const xmlText = await res.text(); // Get XML text response
                // Parse XML to JSON object
                const games = parseGameXML(xmlText);
                currentGames = games; // Save current game list

                if (!currentGames || currentGames.length === 0) {
                    container.innerHTML = '<div class="empty">No games found matching your criteria</div>';
                    return;
                }

                renderGames(currentGames, container);
            } catch (err) {
                console.error('Load failed:', err);
                container.innerHTML = '<div class="empty">Load failed, please try again</div>';
            }
        }

        // Parse XML response to game array (match JSON structure)
        function parseGameXML(xmlText) {
            const parser = new DOMParser();
            const xmlDoc = parser.parseFromString(xmlText, "text/xml");
            const gameElements = xmlDoc.getElementsByTagName("item");
            const games = [];

            // Convert each XML item element to object
            for (let i = 0; i < gameElements.length; i++) {
                const el = gameElements[i];
                const game = {
                    title: el.getElementsByTagName("title")[0]?.textContent || 'Unknown Game',
                    image: el.getElementsByTagName("thumb")[0]?.textContent || '',
                    embed: el.getElementsByTagName("url")[0]?.textContent || '',
                    url: el.getElementsByTagName("url")[0]?.textContent || '',
                    category: el.getElementsByTagName("category")[0]?.textContent || 'Unknown Category',
                    tags: el.getElementsByTagName("tags")[0]?.textContent || 'No tags',
                    instructions: el.getElementsByTagName("instructions")[0]?.textContent || 'No instructions',
                    description: el.getElementsByTagName("description")[0]?.textContent || 'No description'
                };
                games.push(game);
            }
            return games;
        }

        // Render game list (click card to go to detail page)
        function renderGames(games, container) {
            const grid = document.createElement('div');
            grid.className = 'games-grid';

            games.forEach((game, index) => {
                const card = document.createElement('div');
                card.className = 'game-card';
                // Click card to show detail page
                card.onclick = () => showGameDetail(index);

                // Game cover image container
                const coverContainer = document.createElement('div');
                coverContainer.className = 'game-cover-container';
                
                // Game cover image (with fallback)
                const cover = document.createElement('img');
                cover.className = 'game-cover';
                cover.src = game.image || 'https://placehold.co/300x200/333333/666666?text=No+Cover';
                cover.alt = game.title || 'Game Cover';
                // Fallback if image fails to load
                cover.onerror = function() {
                    this.src = 'https://placehold.co/300x200/333333/666666?text=No+Cover';
                };

                const info = document.createElement('div');
                info.className = 'game-info';

                const title = document.createElement('div');
                title.className = 'game-title';
                title.textContent = game.title || 'Unknown Game';

                const meta = document.createElement('div');
                meta.className = 'game-meta';
                
                // Add category tag
                const categorySpan = document.createElement('span');
                categorySpan.textContent = game.category || 'Unknown';
                meta.appendChild(categorySpan);
                
                // Add tags
                if (game.tags && game.tags !== 'No tags') {
                    const tags = game.tags.split(', ');
                    tags.forEach(tag => {
                        if (tag.trim()) {
                            const tagSpan = document.createElement('span');
                            tagSpan.textContent = tag.trim();
                            meta.appendChild(tagSpan);
                        }
                    });
                }

                // Assemble card
                coverContainer.appendChild(cover);
                info.appendChild(title);
                info.appendChild(meta);
                card.appendChild(coverContainer);
                card.appendChild(info);
                grid.appendChild(card);
            });

            container.innerHTML = '';
            container.appendChild(grid);
        }

        // Show game detail page
        function showGameDetail(gameIndex) {
            const game = currentGames[gameIndex];
            if (!game) return;

            // Hide filter section, game list, show detail page
            document.querySelector('.filter-sidebar').style.display = 'none';
            document.getElementById('games-container').style.display = 'none';
            const detailPage = document.getElementById('game-detail');
            detailPage.style.display = 'block';
            
            // Modify grid layout to use full width for detail page
            document.querySelector('.main-layout').style.gridTemplateColumns = '1fr';
            
            // Update fullscreen button text
            updateFullscreenButton();

            // Set detail page title
            document.getElementById('detail-game-title').textContent = game.title || 'Unknown Game';
            
            // Set game instructions and description
            document.getElementById('detail-game-instructions').textContent = game.instructions || 'No instructions';
            document.getElementById('detail-game-description').textContent = game.description || 'No description';

            // 1. Load game guide video (extract game ID from embed URL)
            let gameId = '';
            if (game.embed) {
                const idMatch = game.embed.match(/gameid=([a-zA-Z0-9]+)/) || game.embed.match(/([a-zA-Z0-9]{20,})/);
                gameId = idMatch ? idMatch[1] : '4kci7og3klgj0ivy2wz3gdvd9dth5e7n';
            } else {
                gameId = '4kci7og3klgj0ivy2wz3gdvd9dth5e7n';
            }

            // Inject video player script using user-provided code pattern
            const videoContainer = document.getElementById('gamemonetize-video');
            videoContainer.innerHTML = '';
            window.VIDEO_OPTIONS = {
                gameid: gameId,
                game: game.title || 'Unknown Game',
                width: "100%",
                height: "480px",
                color: "#3f007e",
                getAds: "false"
            };

            // Load video API script using self-executing function
            (function (a, b, c) {
                var d = a.getElementsByTagName(b)[0];
                a.getElementById(c) || (a = a.createElement(b), a.id = c, a.src = "https://api.gamemonetize.com/video.js", d.parentNode.insertBefore(a, d))
            })(document, "script", "gamemonetize-video-api");

            // 2. Load game embedded player
            const gameIframe = document.getElementById('game-player-iframe');
            gameIframe.src = game.embed || game.url || '#';
        }

        // Back to game list from detail page
        function backToList() {
            // Hide detail page, show filter section and list
            document.getElementById('game-detail').style.display = 'none';
            document.querySelector('.filter-sidebar').style.display = 'block';
            document.getElementById('games-container').style.display = 'block';
            // Clear video script to avoid duplicate loading
            document.getElementById('gamemonetize-video').innerHTML = '';
            // Clear iframe src
            document.getElementById('game-player-iframe').src = '';
            
            // Restore original grid layout
            document.querySelector('.main-layout').style.gridTemplateColumns = '300px 1fr';
        }
        
        // Toggle fullscreen for game area
        function toggleFullscreen() {
            const gameIframe = document.getElementById('game-player-iframe');
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            
            if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                // Enter fullscreen
                if (gameIframe.requestFullscreen) {
                    gameIframe.requestFullscreen();
                } else if (gameIframe.webkitRequestFullscreen) {
                    gameIframe.webkitRequestFullscreen();
                } else if (gameIframe.msRequestFullscreen) {
                    gameIframe.msRequestFullscreen();
                } else if (gameIframe.mozRequestFullScreen) {
                    gameIframe.mozRequestFullScreen();
                }
                fullscreenBtn.textContent = 'Exit Fullscreen';
            } else {
                // Exit fullscreen
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                }
                fullscreenBtn.textContent = 'Fullscreen';
            }
        }
        
        // Update fullscreen button text based on current state
        function updateFullscreenButton() {
            const fullscreenBtn = document.getElementById('fullscreen-btn');
            if (fullscreenBtn) {
                const isFullscreen = !!document.fullscreenElement || !!document.webkitFullscreenElement || !!document.msFullscreenElement || !!document.mozFullScreenElement;
                fullscreenBtn.textContent = isFullscreen ? 'Exit Fullscreen' : 'Fullscreen';
            }
        }
        
        // Listen for fullscreen change events
        document.addEventListener('fullscreenchange', updateFullscreenButton);
        document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
        document.addEventListener('msfullscreenchange', updateFullscreenButton);
        document.addEventListener('mozfullscreenchange', updateFullscreenButton);

        // Auto load games on page load
        window.onload = () => {
            fetchGames(1);
            // Update fullscreen button text on page load
            updateFullscreenButton();
        }
    </script>
</body>
</html>
