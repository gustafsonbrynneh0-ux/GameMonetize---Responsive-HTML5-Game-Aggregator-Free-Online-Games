<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found - GameMonetize</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎮</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6c5ce7;
            --secondary: #00cec9;
            --darker: #1a1a2e;
            --light: #f9f9f9;
            --glass-bg: rgba(255,255,255,0.05);
            --glass-border: rgba(255,255,255,0.1);
            --border-radius: 12px;
            --max-width: 1400px;
            --transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Poppins', Arial, sans-serif; }
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: var(--light); min-height: 100vh; display: flex; flex-direction: column; }

        .navbar { background: rgba(15,15,35,0.85); backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border); padding: 0 20px; }
        .navbar-inner { max-width: var(--max-width); margin: 0 auto; display: flex; align-items: center; height: 64px; }
        .navbar-logo { font-size: 1.6rem; font-weight: 900; background: linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-decoration: none; }

        .error-page { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
        .error-content { max-width: 500px; }
        .error-code { font-size: 8rem; font-weight: 900; background: linear-gradient(135deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; margin-bottom: 10px; }
        .error-title { font-size: 1.5rem; font-weight: 700; margin-bottom: 12px; }
        .error-text { color: rgba(255,255,255,0.6); font-size: 15px; line-height: 1.7; margin-bottom: 30px; }
        .error-btn { display: inline-flex; align-items: center; gap: 8px; background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; text-decoration: none; padding: 12px 30px; border-radius: var(--border-radius); font-size: 15px; font-weight: 600; transition: var(--transition); box-shadow: 0 4px 20px rgba(108,92,231,0.4); }
        .error-btn:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(108,92,231,0.5); }
        .error-icon { font-size: 60px; margin-bottom: 16px; }

        @media (max-width: 480px) { .error-code { font-size: 5rem; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="navbar-logo">GameMonetize</a>
        </div>
    </nav>

    <div class="error-page">
        <div class="error-content">
            <div class="error-icon">&#127919;</div>
            <div class="error-code">404</div>
            <h1 class="error-title">Game Over! Page Not Found</h1>
            <p class="error-text">The page you're looking for doesn't exist or has been moved. Don't worry — there are plenty of games waiting for you!</p>
            <a href="/" class="error-btn">&#127968; Back to Home</a>
        </div>
    </div>
</body>
</html>
